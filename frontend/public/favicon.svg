<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background glass tile -->
  <rect width="48" height="48" rx="12" fill="#09090b" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1.5" />
  
  <!-- Glowing Medical Plus Symbol -->
  <path d="M24 10V38M10 24H38" stroke="url(#skyGrad)" stroke-width="6.5" stroke-linecap="round" filter="url(#glow)" />
  <path d="M24 13V35M13 24H35" stroke="#fafafa" stroke-width="2.5" stroke-linecap="round" />
</svg>